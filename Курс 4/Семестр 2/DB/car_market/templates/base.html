<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}CarMarket{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; }
    nav a { margin-right: 15px; text-decoration: none; color: #0066cc; }
    .flash-success { background: #d4edda; border: 1px solid #c3e6cb; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    .card { border: 1px solid #ddd; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f5f5f5; }
    input, textarea, select { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button, .btn { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
    button:hover, .btn:hover { background: #0052a3; }
    label { font-weight: bold; display: block; margin-bottom: 3px; }
    .error { color: red; font-size: 0.85em; }
    .star { color: #f5a623; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}">🏠 Главная</a>
    <a href="{{ url_for('car_new') }}">➕ Добавить авто</a>
    <a href="{{ url_for('search') }}">🔍 Поиск</a>
  </nav>
  <hr>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="flash-{{ category }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <style>
    .flash-success { background:#d4edda; border:1px solid #c3e6cb; padding:10px; margin-bottom:10px; }
    .flash-error   { background:#f8d7da; border:1px solid #f5c2c7; padding:10px; margin-bottom:10px; }
  </style>

  {% block content %}{% endblock %}
</body>
</html>
